name: Docker Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/angple-web
  ECR_REGISTRY: 891376997084.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: angple-web
  AWS_REGION: ap-northeast-2

jobs:
  # ──────────────────────────────────────────────
  # 1단계: 빌드 → GHCR + ECR push (자동)
  # ──────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.tags.outputs.sha_tag }}

    steps:
      - name: Checkout angple
        uses: actions/checkout@v4

      - name: Checkout angple-premium
        uses: actions/checkout@v4
        with:
          repository: angple/angple-premium
          token: ${{ secrets.PREMIUM_REPO_TOKEN }}
          path: _premium
        continue-on-error: true

      - name: Install premium assets
        if: hashFiles('_premium/deploy/install.sh') != ''
        run: |
          chmod +x _premium/deploy/install.sh
          _premium/deploy/install.sh .
          echo "Premium assets installed"

      - name: Ensure premium directories exist
        run: mkdir -p custom-themes custom-widgets extensions plugins widgets

      # --- 네이티브 빌드 ---
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages & web
        env:
          VITE_USE_MOCK: 'false'
          VITE_GAM_NETWORK_CODE: '23338387889'
          VITE_GAM_SITE_NAME: 'damoang'
        run: |
          pnpm --filter "./packages/*" build
          echo "VITE_GAM_NETWORK_CODE=23338387889" > apps/web/.env
          echo "VITE_GAM_SITE_NAME=damoang" >> apps/web/.env
          pnpm --filter web build

      - name: Prepare deploy package
        run: |
          pnpm --filter web deploy --prod --legacy apps/web/deploy
          cp -r apps/web/build apps/web/deploy/
          for dir in plugins widgets themes custom-themes custom-widgets extensions; do
            cp -r "$dir" "apps/web/deploy/" 2>/dev/null || mkdir -p "apps/web/deploy/$dir"
          done

      # --- Docker 이미지 빌드 + push ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          SHA_TAG="sha-${GITHUB_SHA}"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push to GHCR + ECR
        uses: docker/build-push-action@v5
        with:
          context: apps/web/deploy
          file: apps/web/Dockerfile.prod
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha_tag }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.sha_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Build summary
        run: |
          echo "### Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- GHCR: \`${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- ECR: \`${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.sha_tag }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────
  # 2단계: 카나리 배포 + 스모크 테스트 (자동)
  # ──────────────────────────────────────────────
  deploy-canary:
    name: Canary Deploy & Smoke Test
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy canary via SSM
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          echo "Deploying canary with tag: $IMAGE_TAG"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-038a1d1f00798d94b" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"/home/angple/k8s/prod/deploy.sh web $IMAGE_TAG --canary-only\"
            ]" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command: $COMMAND_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-038a1d1f00798d94b" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "Canary deploy + smoke test passed!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardOutputContent" \
                --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Canary failed: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done
          echo "Timed out"
          exit 1

      - name: Notify Telegram (승인 요청)
        if: success()
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MSG="✅ 카나리 배포 통과 — 승인 대기 중

          ${COMMIT_MSG}
          Tag: ${IMAGE_TAG}

          👉 승인하기: ${RUN_URL}"

          # 들여쓰기 제거
          MSG=$(echo "$MSG" | sed 's/^          //')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MSG}" >/dev/null 2>&1 || true

      - name: Canary summary
        run: |
          echo "### Canary Passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${{ needs.build.outputs.image-tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 스모크 테스트 통과 → 본배포 승인 대기 중" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────
  # 3단계: 본배포 (수동 승인 후)
  # ──────────────────────────────────────────────
  deploy-production:
    name: Production Deploy
    needs: [build, deploy-canary]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production  # ← 승인 게이트
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to production via SSM
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          echo "Production deploy with tag: $IMAGE_TAG"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-038a1d1f00798d94b" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"/home/angple/k8s/prod/deploy.sh web $IMAGE_TAG --skip-canary\"
            ]" \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command: $COMMAND_ID"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-038a1d1f00798d94b" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "Production deploy complete!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardOutputContent" \
                --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Production deploy failed: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done
          echo "Timed out"
          exit 1

      - name: Deploy summary
        run: |
          echo "### Production Deploy Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${{ needs.build.outputs.image-tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 전체 Pod 롤링 업데이트 완료" >> "$GITHUB_STEP_SUMMARY"
