name: Deploy Build to Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '배포 확인 ("deploy" 입력)'
        required: true
        type: string

permissions:
  id-token: write
  contents: write

env:
  NODE_VERSION: '22'
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: angple-web

jobs:
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    if: inputs.confirm == 'deploy'
    outputs:
      image_tag: ${{ steps.build.outputs.IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout angple-premium
        uses: actions/checkout@v4
        with:
          repository: damoang/angple-premium
          token: ${{ secrets.PREMIUM_REPO_TOKEN }}
          path: _premium
        continue-on-error: true

      - name: Install premium assets
        if: hashFiles('_premium/deploy/install.sh') != ''
        run: |
          chmod +x _premium/deploy/install.sh
          _premium/deploy/install.sh .

      - name: Setup directories
        run: mkdir -p custom-themes custom-widgets extensions plugins widgets

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "./packages/*" build

      - name: Build web
        env:
          VITE_GAM_NETWORK_CODE: '23338387889'
          VITE_GAM_SITE_NAME: 'damoang'
        run: pnpm --filter web build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG=$(date +%Y%m%d-%H%M%S)
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          LATEST_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          echo "Building ARM64 image: ${FULL_IMAGE}"

          # Create Dockerfile
          cat > apps/web/Dockerfile << 'EOF'
          FROM node:22-alpine
          WORKDIR /app
          COPY package.json ./
          COPY build ./build
          RUN npm install --omit=dev --ignore-scripts 2>/dev/null || true
          ENV NODE_ENV=production
          ENV PORT=3000
          EXPOSE 3000
          CMD ["node", "build/index.js"]
          EOF

          # Build and push for ARM64
          cd apps/web
          docker buildx build \
            --platform linux/arm64 \
            -t "${FULL_IMAGE}" \
            -t "${LATEST_IMAGE}" \
            --push \
            .

          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Image pushed: ${FULL_IMAGE}"

      - name: Create GitHub Release
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          TAG="deploy-${TIMESTAMP}"

          # Delete old deploy releases (keep last 5)
          gh release list --limit 100 | grep "^deploy-" | tail -n +6 | cut -f1 | while read tag; do
            gh release delete "$tag" --yes --cleanup-tag || true
          done

          # Create release (for tracking)
          gh release create "${TAG}" \
            --title "Deploy ${TIMESTAMP}" \
            --notes "Docker image: ${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${{ steps.build.outputs.IMAGE_TAG }}"

          echo "Release created: ${TAG}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-038a1d1f00798d94b" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "kubectl set image deployment/angple-web -n angple web=891376997084.dkr.ecr.ap-northeast-2.amazonaws.com/angple-web:'"$IMAGE_TAG"'",
              "kubectl rollout status deployment/angple-web -n angple --timeout=120s"
            ]' \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          echo "Waiting for deployment..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "i-038a1d1f00798d94b" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-038a1d1f00798d94b" \
            --query "Status" \
            --output text)

          echo "Status: $STATUS"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-038a1d1f00798d94b" \
            --query "StandardOutputContent" \
            --output text

          if [ "$STATUS" != "Success" ]; then
            echo "Error:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-038a1d1f00798d94b" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi
