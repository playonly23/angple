name: Deploy Build to Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '배포 확인 ("deploy" 입력)'
        required: true
        type: string

permissions:
  id-token: write
  contents: write

env:
  NODE_VERSION: '22'
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: angple-web
  ECR_REGISTRY: 891376997084.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-24.04-arm  # ARM64 네이티브 (QEMU 불필요)
    if: inputs.confirm == 'deploy'

    steps:
      - uses: actions/checkout@v4

      - name: Checkout angple-premium
        uses: actions/checkout@v4
        with:
          repository: damoang/angple-premium
          token: ${{ secrets.PREMIUM_REPO_TOKEN }}
          path: _premium

      - name: Install premium assets
        run: |
          if [ ! -f "_premium/deploy/install.sh" ]; then
            echo "FATAL: Premium repo checkout failed or install.sh missing!"
            exit 1
          fi
          chmod +x _premium/deploy/install.sh
          _premium/deploy/install.sh .

      - name: Setup directories
        run: mkdir -p custom-themes custom-widgets extensions plugins widgets

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "./packages/*" build

      - name: Build web
        env:
          VITE_GAM_NETWORK_CODE: '23338387889'
          VITE_GAM_SITE_NAME: 'damoang'
        run: |
          echo "VITE_GAM_NETWORK_CODE=23338387889" > apps/web/.env
          echo "VITE_GAM_SITE_NAME=damoang" >> apps/web/.env

          rm -rf apps/web/.svelte-kit apps/web/build apps/web/node_modules/.vite
          pnpm --filter web build

          echo "=== Build verification ==="
          grep -rl "private_env.ADS_SERVER_URL" apps/web/build/server/ 2>/dev/null | grep -v ".map" || echo "WARNING: ADS_SERVER_URL not found in build!"
          grep -c "localhost:9090" apps/web/build/server/chunks/_server.ts-*.js 2>/dev/null && echo "WARNING: localhost:9090 hardcoded in server chunks!" || true

          if grep -rl "23338387889" apps/web/build/client/ >/dev/null 2>&1; then
            echo "GAM network code verified in client bundle"
          else
            echo "FATAL: GAM network code NOT found in client bundle!"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare deployment package
        run: |
          pnpm --filter web deploy --prod --legacy apps/web/deploy

          cp -r apps/web/build apps/web/deploy/

          # 기존 부분 복사 방지 — 깨끗한 상태에서 복사
          rm -rf apps/web/deploy/plugins apps/web/deploy/widgets apps/web/deploy/themes
          rm -rf apps/web/deploy/custom-themes apps/web/deploy/custom-widgets apps/web/deploy/extensions

          cp -r plugins apps/web/deploy/
          cp -r widgets apps/web/deploy/ 2>/dev/null || mkdir -p apps/web/deploy/widgets
          cp -r themes apps/web/deploy/ 2>/dev/null || mkdir -p apps/web/deploy/themes
          cp -r custom-themes apps/web/deploy/ 2>/dev/null || mkdir -p apps/web/deploy/custom-themes
          cp -r custom-widgets apps/web/deploy/ 2>/dev/null || mkdir -p apps/web/deploy/custom-widgets
          cp -r extensions apps/web/deploy/ 2>/dev/null || mkdir -p apps/web/deploy/extensions

          # 필수 검증 — 플러그인 최소 개수 미달 시 빌드 실패
          echo "=== Plugin verification ==="
          ls -la apps/web/deploy/plugins/
          PLUGIN_COUNT=$(ls apps/web/deploy/plugins/*/plugin.json 2>/dev/null | wc -l)
          echo "Plugins with manifest: $PLUGIN_COUNT"
          if [ "$PLUGIN_COUNT" -lt 5 ]; then
            echo "FATAL: Expected at least 5 plugins, found $PLUGIN_COUNT!"
            echo "Premium checkout or install.sh may have failed."
            exit 1
          fi

      - name: Build and push Docker image
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:sha-${{ github.sha }}"
          LATEST_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          echo "Building ARM64 image: ${FULL_IMAGE}"

          cat > apps/web/deploy/Dockerfile << 'EOF'
          FROM node:22-alpine
          WORKDIR /app
          COPY . .
          ENV NODE_ENV=production
          ENV PORT=3000
          EXPOSE 3000
          CMD ["node", "build/index.js"]
          EOF

          cd apps/web/deploy
          docker buildx build \
            --platform linux/arm64 \
            --no-cache \
            -t "${FULL_IMAGE}" \
            -t "${LATEST_IMAGE}" \
            --push \
            .

          echo "Image pushed: ${FULL_IMAGE}"

      - name: Deploy via SSM
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-038a1d1f00798d94b" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "/home/angple/k8s/prod/deploy.sh web '"$IMAGE_TAG"'"
            ]' \
            --timeout-seconds 900 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # 커스텀 폴링 (15초 간격, 최대 60회 = 15분)
          echo "Waiting for deployment..."
          for i in $(seq 1 60); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-038a1d1f00798d94b" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "  [$i/60] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deployment failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
          done

          if [ "$STATUS" != "Success" ]; then
            echo "Deployment timed out (still $STATUS after 15 minutes)"
            exit 1
          fi

          # 성공 시 출력 표시
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-038a1d1f00798d94b" \
            --query "StandardOutputContent" \
            --output text
