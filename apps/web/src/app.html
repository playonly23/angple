<!doctype html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <script>
            // 테마 모드 즉시 적용 (FOUC 방지 — CSS 파싱보다 먼저 실행)
            // 1순위: 쿠키 (SSR과 동일한 소스)
            // 2순위: localStorage (기존 사용자 호환)
            // 3순위: prefers-color-scheme (첫 방문자)
            (function () {
                var c = document.cookie.match(/angple_theme_mode=(\w+)/);
                var m = c ? c[1] : null;
                if (!m) {
                    try {
                        m = localStorage.getItem('themeMode');
                        if (!m && localStorage.getItem('darkMode') === 'true') m = 'dark';
                    } catch (e) {}
                }
                if (!m && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    m = 'dark';
                }
                if (m === 'dark') document.documentElement.classList.add('dark');
                else if (m === 'amoled') document.documentElement.classList.add('amoled');
                // 쿠키에 기록 (SSR 동기화용, 1년 만료)
                if (m === 'dark' || m === 'amoled') {
                    document.cookie =
                        'angple_theme_mode=' + m + ';path=/;max-age=31536000;SameSite=Lax';
                }
            })();
            // UI 밀도 즉시 적용 (SSR과 동일한 CSS 변수 설정)
            (function () {
                var c = document.cookie.match(/angple_ui_density=(\w+)/);
                var d = c ? c[1] : null;
                if (!d) {
                    try {
                        d = localStorage.getItem('angple_ui_density');
                    } catch (e) {}
                }
                if (d !== 'compact' && d !== 'balanced' && d !== 'relaxed') d = 'balanced';
                var p = d === 'compact' ? '0px' : d === 'relaxed' ? '6px' : '3px';
                var s = document.documentElement.style;
                s.setProperty('--row-pad-extra', p);
                s.setProperty('--comment-pad-extra', p);
                if (d !== 'balanced') {
                    document.cookie =
                        'angple_ui_density=' + d + ';path=/;max-age=31536000;SameSite=Lax';
                }
            })();
        </script>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <!-- Critical CSS: FOUC 방지 (CSS 번들 로드 전 즉시 적용) -->
        <style>
            .mobile-meta,
            .mobile-only {
                display: none;
            }
            @media (min-width: 768px) {
                .md\:hidden {
                    display: none !important;
                }
            }
        </style>
        <meta name="theme-color" content="#1a1a1a" />
        <link rel="manifest" href="/manifest.json" />
        <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32" />
        <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16" />
        <link rel="shortcut icon" href="/favicon.ico" />
        <link rel="apple-touch-icon" href="/icons/icon-192.png" />
        <!-- nosemgrep: html.security.audit.missing-integrity.missing-integrity -->
        <link
            rel="stylesheet"
            crossorigin
            href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css"
        />
        <!-- nosemgrep: html.security.audit.missing-integrity.missing-integrity -->
        <script
            src="https://challenges.cloudflare.com/turnstile/v0/api.js"
            async
            defer
            crossorigin="anonymous"
        ></script>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
        <script>
            // JS 로드 실패 감지: script 에러 시 캐시 삭제 + 안내 배너
            (function () {
                var errorCount = 0;
                window.addEventListener('error', function (e) {
                    // JS/CSS 리소스 로드 실패만 감지 (script, link 태그)
                    var t = e.target;
                    if (t && (t.tagName === 'SCRIPT' || t.tagName === 'LINK')) {
                        errorCount++;
                        if (errorCount >= 2) showReloadBanner();
                    }
                }, true); // capture phase로 리소스 에러 잡기

                function showReloadBanner() {
                    if (document.getElementById('reload-banner')) return;
                    var d = document.createElement('div');
                    d.id = 'reload-banner';
                    d.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99999;background:#1e293b;color:white;padding:14px 20px;display:flex;align-items:center;justify-content:center;gap:12px;font-family:-apple-system,sans-serif;font-size:14px;box-shadow:0 -2px 10px rgba(0,0,0,.2)';
                    d.innerHTML = '<span>새 버전이 배포되었습니다. 정상 이용을 위해 새로고침이 필요합니다.</span><button onclick="caches&&caches.keys().then(function(n){n.forEach(function(k){caches.delete(k)})});location.reload()" style="padding:8px 16px;font-size:13px;cursor:pointer;border-radius:6px;border:none;background:#3b82f6;color:white;white-space:nowrap">새로고침</button>';
                    document.body.appendChild(d);
                }
            })();
        </script>
        <script>
            if ('serviceWorker' in navigator) {
                if (location.hostname === 'localhost' || location.hostname.startsWith('dev.')) {
                    // dev 환경: SW 해제 + Cache Storage 전체 삭제
                    navigator.serviceWorker.getRegistrations().then(function (regs) {
                        regs.forEach(function (r) {
                            r.unregister();
                        });
                    });
                    caches.keys().then(function (names) {
                        names.forEach(function (name) {
                            caches.delete(name);
                        });
                    });
                } else {
                    // 운영 환경: SW 등록 + 배포 감지 시 캐시 자동 정리
                    navigator.serviceWorker.register('/sw.js').then(function (reg) {
                        // 새 SW 발견 시 즉시 활성화
                        reg.addEventListener('updatefound', function () {
                            var newSw = reg.installing;
                            if (newSw) {
                                newSw.addEventListener('statechange', function () {
                                    if (newSw.state === 'activated') {
                                        // 새 SW 활성화 → 오래된 캐시 전체 정리
                                        caches.keys().then(function (names) {
                                            names.forEach(function (name) {
                                                caches.delete(name);
                                            });
                                        });
                                    }
                                });
                            }
                        });
                    });
                    // 페이지 로드 시마다 SW 업데이트 확인
                    navigator.serviceWorker.ready.then(function (reg) {
                        reg.update();
                    });
                }
            }
        </script>
    </body>
</html>
